<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Blue to purple gradient (top-right = bright blue, bottom-left = deep purple) -->
    <linearGradient id="gBody" x1="80%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%"   stop-color="#00C4FF"/>
      <stop offset="35%"  stop-color="#2255FF"/>
      <stop offset="100%" stop-color="#7B0FCC"/>
    </linearGradient>

    <!-- Orbit ring gradient (top bright blue arc) -->
    <linearGradient id="gOrbit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00D8FF"/>
      <stop offset="50%"  stop-color="#1E66FF"/>
      <stop offset="100%" stop-color="#5500AA"/>
    </linearGradient>

    <!-- Deep purple/shadow for the right side inner N -->
    <linearGradient id="gDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3044DD"/>
      <stop offset="100%" stop-color="#5A0099"/>
    </linearGradient>

    <!-- Star color -->
    <linearGradient id="gStar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#A0F0FF"/>
      <stop offset="100%" stop-color="#40CCFF"/>
    </linearGradient>

    <filter id="dropGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#0088FF" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- =========================================
       ORBIT SWOOSH RING (large arc around the N)
       ========================================= -->
  <!-- Bottom sweeping arc: left-bottom going right under N -->
  <path d="M 22 145
           C 18 155, 30 172, 58 172
           C 85 172, 115 158, 138 138
           C 160 118, 174 95, 172 74
           C 170 54, 155 44, 140 50"
        stroke="url(#gOrbit)" stroke-width="13" stroke-linecap="round" fill="none"
        filter="url(#dropGlow)" opacity="0.9"/>

  <!-- Top thin trailing arc going back left (swoosh tail) -->
  <path d="M 22 145
           C 14 136, 16 120, 24 110"
        stroke="url(#gOrbit)" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- =========================================
       LETTER N
       ========================================= -->

  <!-- Left vertical pillar -->
  <path d="M 34 155 L 34 60
           C 34 52, 43 48, 50 54
           L 50 149 Z"
        fill="url(#gBody)"/>

  <!-- Diagonal slash (left-top to right-bottom) — the connecting bar of N -->
  <path d="M 48 56 L 58 68 L 124 148 L 113 156 L 46 72 Z"
        fill="url(#gBody)"/>

  <!-- Right vertical pillar -->
  <path d="M 115 54 L 130 54
           L 130 148 L 118 155 L 118 64 Z"
        fill="url(#gDark)"/>

  <!-- Depth shadow inner left pillar -->
  <path d="M 48 56 L 50 54 L 50 70 L 48 72 Z"
        fill="#0A005A" opacity="0.35"/>

  <!-- =========================================
       4-POINTED SPARKLE STAR (top right)
       ========================================= -->
  <g transform="translate(152, 35)">
    <!-- Outer tips -->
    <path d="M 0 -20 L 4 -4 L 20 0 L 4 4 L 0 20 L -4 4 L -20 0 L -4 -4 Z"
          fill="url(#gStar)" filter="url(#dropGlow)"/>
  </g>

</svg>
